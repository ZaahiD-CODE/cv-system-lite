{% extends "base.html" %}
{% block title %}Вход — CV System{% endblock %}
{% block body %}
<div class="login-container">
    <div class="login-card">
        <h1>CV System</h1>
        <p class="subtitle" id="login-subtitle"></p>
        <div id="login-error" class="alert alert-error" style="display:none"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="username" id="label-login"></label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="password" id="label-password"></label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px" id="btn-signin"></button>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    if (Auth.isAuthenticated()) window.location.href = '/dashboard';
    document.getElementById('login-subtitle').textContent = t('platform');
    document.getElementById('label-login').textContent = t('username');
    document.getElementById('username').placeholder = t('enterLogin');
    document.getElementById('label-password').textContent = t('password');
    document.getElementById('password').placeholder = t('enterPassword');
    document.getElementById('btn-signin').textContent = t('signIn');
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('login-error');
        errorEl.style.display = 'none';
        try {
            const data = await API.post('/auth/login', {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            });
            Auth.setToken(data.access_token, data.role, data.username);
            window.location.href = '/dashboard';
        } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = 'block';
        }
    });
</script>
{% endblock %}
